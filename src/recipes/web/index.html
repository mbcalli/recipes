<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Manager</title>
  <style>
    /* ── Variables ── */
    :root {
      --bg:       #f7f6f3;
      --surface:  #ffffff;
      --border:   #e2e0da;
      --accent:   #c0683a;
      --accent-h: #a8562e;
      --text:     #1e1c19;
      --muted:    #7a7670;
      --ok:       #3a7c5a;
      --danger:   #b03a3a;
      --radius:   8px;
      --shadow:   0 1px 3px rgba(0,0,0,.08);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

    /* ── Layout ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border);
             padding: 0 24px; display: flex; align-items: center; gap: 32px;
             position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 17px; font-weight: 600; padding: 14px 0; white-space: nowrap; }
    nav { display: flex; gap: 4px; }
    .tab-btn { background: none; border: none; cursor: pointer; padding: 16px 14px 14px;
               font-size: 14px; font-weight: 500; color: var(--muted);
               border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    main { max-width: 860px; margin: 0 auto; padding: 28px 24px; }
    .tab { display: none; }
    .tab.active { display: block; }

    /* ── Cards / sections ── */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase;
                     letter-spacing: .05em; color: var(--muted); margin-bottom: 14px; }

    /* ── Forms ── */
    .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input[type=text], input[type=url], input[type=date], input[type=number], textarea {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text);
      outline: none; transition: border-color .15s; }
    input[type=text]:focus, input[type=url]:focus, input[type=date]:focus,
    input[type=number]:focus, textarea:focus { border-color: var(--accent); }
    input.wide, textarea.wide { flex: 1; min-width: 200px; }
    textarea { resize: vertical; min-height: 64px; }
    .check-label { display: flex; align-items: center; gap: 6px; font-size: 13px;
                   color: var(--muted); cursor: pointer; white-space: nowrap; }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; border-radius: var(--radius);
             font-size: 13px; font-weight: 500; font-family: inherit; transition: background .15s; }
    .btn-primary { background: var(--accent); color: #fff; padding: 7px 14px; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost  { background: none; color: var(--muted); padding: 4px 8px; font-size: 12px; }
    .btn-ghost:hover { color: var(--text); background: var(--bg); }
    .btn-danger { background: none; color: var(--danger); padding: 4px 8px; font-size: 12px; }
    .btn-danger:hover { background: #fdf0f0; }

    /* ── Status / feedback ── */
    .status { font-size: 13px; margin-top: 8px; min-height: 18px; }
    .status.ok  { color: var(--ok); }
    .status.err { color: var(--danger); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
               border-top-color: var(--accent); border-radius: 50%;
               animation: spin .6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Recipe list ── */
    .recipe-item { border-bottom: 1px solid var(--border); }
    .recipe-item:last-child { border-bottom: none; }
    .recipe-summary { display: flex; align-items: center; gap: 10px;
                      padding: 12px 4px; cursor: pointer; list-style: none; }
    .recipe-summary::-webkit-details-marker { display: none; }
    .recipe-name { font-weight: 500; flex: 1; }
    .recipe-rating { font-size: 13px; color: var(--muted); }
    .badge-unlim { font-size: 11px; background: #f0ede8; color: var(--muted);
                   border-radius: 4px; padding: 1px 6px; }
    .recipe-detail { padding: 4px 4px 16px; border-top: 1px solid var(--border); }
    .recipe-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .recipe-meta a { color: var(--accent); text-decoration: none; }
    .recipe-meta a:hover { text-decoration: underline; }

    /* Ingredients table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
    th { text-align: left; font-weight: 600; font-size: 12px; color: var(--muted);
         padding: 4px 8px; border-bottom: 1px solid var(--border); }
    td { padding: 5px 8px; border-bottom: 1px solid var(--bg); }
    tr:last-child td { border-bottom: none; }

    /* Instructions */
    .instructions { font-size: 13px; color: var(--text); }
    .instructions ol { padding-left: 18px; }
    .instructions li { margin-bottom: 4px; }

    /* Rating + notes row */
    .recipe-edit-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap;
                       margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .rating-input { width: 60px; }
    .notes-input  { flex: 1; min-width: 180px; }

    /* ── Pantry table ── */
    .pantry-row td { vertical-align: middle; }
    .pantry-row input { width: 70px; padding: 4px 6px; font-size: 13px; }
    .pantry-name-cell { font-weight: 500; }

    /* ── Plan ── */
    .plan-table td:first-child { font-weight: 500; width: 110px; }
    .plan-table td { padding: 8px 10px; }
    .empty-state { color: var(--muted); font-size: 13px; font-style: italic; padding: 12px 4px; }
  </style>
</head>
<body>

<header>
  <h1>🍽 Recipe Manager</h1>
  <nav>
    <button class="tab-btn active" onclick="switchTab('recipes')">Recipes</button>
    <button class="tab-btn"        onclick="switchTab('pantry')">Pantry</button>
    <button class="tab-btn"        onclick="switchTab('plan')">Meal Plan</button>
  </nav>
</header>

<main>

  <!-- ── RECIPES TAB ── -->
  <section id="tab-recipes" class="tab active">
    <div class="card">
      <div class="section-title">Add Recipe from URL</div>
      <div class="input-row">
        <input type="url" id="ingest-url" class="wide" placeholder="https://..." />
        <button class="btn-primary" id="ingest-btn" onclick="ingestRecipe()">Ingest</button>
      </div>
      <div class="status" id="ingest-status"></div>
    </div>

    <div class="card">
      <div class="section-title">Saved Recipes</div>
      <div id="recipes-list"><span class="empty-state">Loading…</span></div>
    </div>
  </section>

  <!-- ── PANTRY TAB ── -->
  <section id="tab-pantry" class="tab">
    <div class="card">
      <div class="section-title">Add Item</div>
      <div class="input-row">
        <input type="text" id="pantry-name" placeholder="Item name" style="min-width:160px" />
        <input type="text" id="pantry-qty"  placeholder="Qty"  style="width:70px" />
        <input type="text" id="pantry-unit" placeholder="Unit" style="width:80px" />
        <label class="check-label">
          <input type="checkbox" id="pantry-unlimited" /> Unlimited
        </label>
        <button class="btn-primary" onclick="addPantryItem()">Add</button>
      </div>
      <div class="status" id="pantry-status"></div>
    </div>

    <div class="card">
      <div class="section-title">Pantry</div>
      <div id="pantry-list"><span class="empty-state">Loading…</span></div>
    </div>
  </section>

  <!-- ── PLAN TAB ── -->
  <section id="tab-plan" class="tab">
    <div class="card">
      <div class="section-title">Generate Plan</div>
      <div class="input-row">
        <input type="date" id="plan-week" />
        <input type="number" id="plan-num-meals" placeholder="# dinners" min="1" max="7" style="width:110px" />
        <input type="text" id="plan-prefs" class="wide" placeholder="Preferences (optional)" />
        <button class="btn-primary" id="plan-btn" onclick="generatePlan()">Generate</button>
      </div>
      <div class="status" id="plan-status"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px">
        <div class="section-title" style="margin:0">This Week's Plan</div>
        <button class="btn-ghost" onclick="loadPlan()">Refresh</button>
      </div>
      <div id="plan-display"><span class="empty-state">No plan loaded.</span></div>
    </div>
  </section>

</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = { recipes: [], pantry: [], plan: null };

// ── API helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn.textContent.toLowerCase().includes(name === 'plan' ? 'meal' : name))
      btn.classList.add('active');
  });
}

// ── Utilities ──────────────────────────────────────────────────────────────
function currentMonday() {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() - ((day + 6) % 7));
  return d.toISOString().slice(0, 10);
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'status ' + (type || '');
  el.innerHTML = msg;
}

function stars(rating) {
  if (rating == null) return '<span style="color:var(--muted)">unrated</span>';
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full) + ` <span style="color:var(--muted)">(${rating})</span>`;
}

// ── RECIPES ────────────────────────────────────────────────────────────────
async function loadRecipes() {
  try {
    state.recipes = await api('GET', '/recipes');
    renderRecipes();
  } catch(e) {
    document.getElementById('recipes-list').innerHTML =
      `<span class="empty-state">Failed to load: ${e.message}</span>`;
  }
}

function renderRecipes() {
  const el = document.getElementById('recipes-list');
  if (!state.recipes.length) {
    el.innerHTML = '<span class="empty-state">No recipes yet. Ingest one above!</span>';
    return;
  }
  el.innerHTML = state.recipes.map(r => `
    <details class="recipe-item">
      <summary class="recipe-summary">
        <span class="recipe-name">${esc(r.name)}</span>
        <span class="recipe-rating">${stars(r.rating)}</span>
      </summary>
      <div class="recipe-detail">
        <div class="recipe-meta">
          ${r.source_url ? `<a href="${esc(r.source_url)}" target="_blank" rel="noopener">View original ↗</a>` : ''}
        </div>

        ${r.ingredients && r.ingredients.length ? `
          <div class="section-title">Ingredients</div>
          <table>
            <tr><th>Ingredient</th><th>Qty</th><th>Unit</th></tr>
            ${r.ingredients.map(i => `
              <tr>
                <td>${esc(i.name)}</td>
                <td>${esc(i.quantity || '—')}</td>
                <td>${esc(i.unit || '—')}</td>
              </tr>`).join('')}
          </table>` : ''}

        ${r.instructions ? `
          <div class="section-title" style="margin-top:14px">Instructions</div>
          <div class="instructions">
            <ol>${r.instructions.split('\n').filter(s=>s.trim()).map(s => `<li>${esc(s)}</li>`).join('')}</ol>
          </div>` : ''}

        <div class="recipe-edit-row">
          <input type="number" class="rating-input" id="rating-${r.id}"
                 value="${r.rating ?? ''}" min="0" max="5" step="0.5" placeholder="0–5" />
          <textarea class="notes-input" id="notes-${r.id}"
                    placeholder="Notes…">${esc(r.notes || '')}</textarea>
          <button class="btn-primary" onclick="saveRecipe(${r.id})">Save</button>
          <button class="btn-danger"  onclick="deleteRecipe(${r.id})">Delete</button>
        </div>
        <div class="status" id="recipe-status-${r.id}"></div>
      </div>
    </details>`).join('');
}

async function ingestRecipe() {
  const url = document.getElementById('ingest-url').value.trim();
  if (!url) return;
  const btn = document.getElementById('ingest-btn');
  btn.disabled = true;
  setStatus('ingest-status', '<span class="spinner"></span> Fetching and extracting…');
  try {
    const recipe = await api('POST', '/recipes/ingest', { url });
    state.recipes.unshift(recipe);
    renderRecipes();
    document.getElementById('ingest-url').value = '';
    setStatus('ingest-status', `✓ Added: ${recipe.name}`, 'ok');
  } catch(e) {
    setStatus('ingest-status', `Error: ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
  }
}

async function saveRecipe(id) {
  const rating = parseFloat(document.getElementById(`rating-${id}`).value);
  const notes  = document.getElementById(`notes-${id}`).value;
  try {
    const updated = await api('PATCH', `/recipes/${id}`, {
      rating: isNaN(rating) ? null : rating,
      notes: notes || null,
    });
    const idx = state.recipes.findIndex(r => r.id === id);
    if (idx !== -1) state.recipes[idx] = { ...state.recipes[idx], ...updated };
    setStatus(`recipe-status-${id}`, '✓ Saved', 'ok');
    renderRecipes();
  } catch(e) {
    setStatus(`recipe-status-${id}`, `Error: ${e.message}`, 'err');
  }
}

async function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  try {
    await api('DELETE', `/recipes/${id}`);
    state.recipes = state.recipes.filter(r => r.id !== id);
    renderRecipes();
  } catch(e) {
    alert('Delete failed: ' + e.message);
  }
}

// ── PANTRY ─────────────────────────────────────────────────────────────────
async function loadPantry() {
  try {
    state.pantry = await api('GET', '/pantry');
    renderPantry();
  } catch(e) {
    document.getElementById('pantry-list').innerHTML =
      `<span class="empty-state">Failed to load: ${e.message}</span>`;
  }
}

function renderPantry() {
  const el = document.getElementById('pantry-list');
  if (!state.pantry.length) {
    el.innerHTML = '<span class="empty-state">Pantry is empty.</span>';
    return;
  }
  el.innerHTML = `
    <table>
      <tr><th>Item</th><th>Qty</th><th>Unit</th><th>Unlimited</th><th></th></tr>
      ${state.pantry.map(item => `
        <tr class="pantry-row" id="pantry-row-${item.id}">
          <td class="pantry-name-cell">${esc(item.name)}</td>
          <td><input type="text" id="pqty-${item.id}"  value="${esc(item.quantity || '')}" placeholder="—" /></td>
          <td><input type="text" id="punit-${item.id}" value="${esc(item.unit || '')}"     placeholder="—" /></td>
          <td style="text-align:center">
            <input type="checkbox" id="punlim-${item.id}" ${item.unlimited ? 'checked' : ''}
                   onchange="toggleUnlimited(${item.id})" />
          </td>
          <td style="white-space:nowrap">
            <button class="btn-ghost"  onclick="savePantryItem(${item.id})">Save</button>
            <button class="btn-danger" onclick="deletePantryItem(${item.id})">✕</button>
          </td>
        </tr>
        <tr>
          <td colspan="5" style="padding:0 8px 6px">
            <span class="status" id="pantry-item-status-${item.id}"></span>
          </td>
        </tr>`).join('')}
    </table>`;
}

async function addPantryItem() {
  const name      = document.getElementById('pantry-name').value.trim();
  const quantity  = document.getElementById('pantry-qty').value.trim() || null;
  const unit      = document.getElementById('pantry-unit').value.trim() || null;
  const unlimited = document.getElementById('pantry-unlimited').checked;
  if (!name) return;
  try {
    const item = await api('POST', '/pantry', { name, quantity, unit, unlimited });
    state.pantry.push(item);
    renderPantry();
    ['pantry-name','pantry-qty','pantry-unit'].forEach(id =>
      document.getElementById(id).value = '');
    document.getElementById('pantry-unlimited').checked = false;
    setStatus('pantry-status', `✓ Added ${item.name}`, 'ok');
  } catch(e) {
    setStatus('pantry-status', `Error: ${e.message}`, 'err');
  }
}

async function savePantryItem(id) {
  const quantity  = document.getElementById(`pqty-${id}`).value.trim() || null;
  const unit      = document.getElementById(`punit-${id}`).value.trim() || null;
  try {
    const updated = await api('PATCH', `/pantry/${id}`, { quantity, unit });
    const idx = state.pantry.findIndex(p => p.id === id);
    if (idx !== -1) state.pantry[idx] = { ...state.pantry[idx], ...updated };
    setStatus(`pantry-item-status-${id}`, '✓ Saved', 'ok');
  } catch(e) {
    setStatus(`pantry-item-status-${id}`, `Error: ${e.message}`, 'err');
  }
}

async function toggleUnlimited(id) {
  const unlimited = document.getElementById(`punlim-${id}`).checked;
  try {
    const updated = await api('PATCH', `/pantry/${id}`, { unlimited });
    const idx = state.pantry.findIndex(p => p.id === id);
    if (idx !== -1) state.pantry[idx].unlimited = updated.unlimited;
  } catch(e) {
    alert('Update failed: ' + e.message);
  }
}

async function deletePantryItem(id) {
  try {
    await api('DELETE', `/pantry/${id}`);
    state.pantry = state.pantry.filter(p => p.id !== id);
    renderPantry();
  } catch(e) {
    alert('Delete failed: ' + e.message);
  }
}

// ── PLAN ───────────────────────────────────────────────────────────────────
async function loadPlan() {
  const week = document.getElementById('plan-week').value || currentMonday();
  try {
    state.plan = await api('GET', `/planner/${week}`);
    renderPlan();
    setStatus('plan-status', '', '');
  } catch(e) {
    if (e.message.includes('404') || e.message.toLowerCase().includes('no meal plan')) {
      state.plan = null;
      renderPlan();
      setStatus('plan-status', 'No plan found for this week.', '');
    } else {
      setStatus('plan-status', `Error: ${e.message}`, 'err');
    }
  }
}

async function generatePlan() {
  const week      = document.getElementById('plan-week').value || currentMonday();
  const numMeals  = parseInt(document.getElementById('plan-num-meals').value) || null;
  const prefs     = document.getElementById('plan-prefs').value.trim() || null;
  const btn       = document.getElementById('plan-btn');
  btn.disabled = true;
  setStatus('plan-status', '<span class="spinner"></span> Generating with Claude…');
  try {
    const body = { week_of: week };
    if (numMeals) body.num_meals = numMeals;
    if (prefs)    body.preferences = prefs;
    state.plan = await api('POST', '/planner/generate', body);
    renderPlan();
    setStatus('plan-status', `✓ Plan generated for week of ${state.plan.week_of}`, 'ok');
  } catch(e) {
    setStatus('plan-status', `Error: ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
  }
}

function renderPlan() {
  const el = document.getElementById('plan-display');
  if (!state.plan) {
    el.innerHTML = '<span class="empty-state">No plan for this week yet.</span>';
    return;
  }
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dinners = {};
  (state.plan.entries || []).forEach(e => {
    if (e.meal_type === 'dinner') dinners[e.day_of_week] = e.recipe_name || '—';
  });
  el.innerHTML = `
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Week of ${state.plan.week_of}
    </p>
    <table class="plan-table">
      <tr><th>Day</th><th>Dinner</th></tr>
      ${DAYS.map(d => `<tr><td>${d}</td><td>${esc(dinners[d] || '—')}</td></tr>`).join('')}
    </table>`;
}

// ── Escape helper ──────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                         .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('plan-week').value = currentMonday();
loadRecipes();
loadPantry();
loadPlan();
</script>
</body>
</html>
